<div class="d-flex sidebar flex-column" [class.sidebar-mobile]="isMobile"
    [class.sidebar-open]="isMobile && isSidebarOpen">
    <div class="profile-wrapper reveal-profile" revealProfile>
        <div class="profile-ring" appTilt>
            <img src="../images/deepak_profile_pic_no_bg.png"
                alt="Deepak Agrawal">
        </div>
        <h5 class="mt-2">Deepak Agrawal</h5>
    </div>
    <ul class="nav flex-column fs-8">
        @for (item of navListItem; track item.id) {
        <li 
            class="nav-item d-flex"
            [class.active]="activeSection === item.id"
            (click)="scrollToSection(item.id)">
            <div class="icon ps-2">
                <i class="bi {{item.icon}}"></i>
            </div>
            <div class="ps-2 item-name">{{item.label}}</div>
        </li>
        }
    </ul>
    <div class="flex-grow-1"></div>
    <div class="d-flex justify-content-evenly social-icons">
        @for (item of connectListItem; track item.id) {
        <a class="link-icon" href="{{item.url}}" target="_blank">
            <i class="bi {{item.icon}}"></i>
        </a>
        }
    </div>
</div>
