  <!-- 🎯 FILTER -->
  <div class="filters text-center mb-4">
    @for (cat of categories; track cat) {
      <button
      class="btn me-2"
      [ngClass]="{
        'btn-warning': selectedCategory() === cat,
        'btn-outline-warning': selectedCategory() !== cat
      }"
      (click)="selectedCategory.set(cat)">

      {{cat}}

    </button>
    }
  </div>

  <!-- 🧩 GRID -->
  <div class="row g-4">

     @if (filteredProjects().length === 0) {

    <div class="col-12 text-center no-data">

      <i class="bi bi-folder-x display-5"></i>

      <h5 class="mt-3">No projects found</h5>

      <p class="text-muted">
        Try selecting a different category
      </p>

      <button class="btn btn-outline-warning"
              (click)="selectedCategory.set('All')">
        Reset Filter
      </button>

    </div>

  } @else {
    @for (p of filteredProjects(); track p.id) {

      <div class="col-md-6 col-lg-4 reveal" appReveal>

        <div class="project-card">

          <div class="image-wrapper">
            <img [src]="p.image">

            <div class="overlay">
              <a class="btn btn-warning btn-sm" [href]="p.demo" target="_blank">Live</a>
              <a class="btn btn-light btn-sm" [href]="p.github" target="_blank">Code</a>
            </div>
          </div>

          <div class="p-3">
            <h5>{{p.title}}</h5>
            <p class="small text-muted">{{p.description}}</p>

            <div class="d-flex flex-wrap gap-2">
              @for (tech of p.techStack; track tech) {
                <span class="badge p-2 bagesTag">{{tech}}</span>
              }
            </div>
          </div>

        </div>

      </div>

    }
}

  </div>


    

</div>
